stages:
  - build-base
  - build-app

variables:
  LIBREOFFICE_VERSION: "26.2.1"
  BASE_IMAGE: $DOCKER_USERNAME/libreoffice:$LIBREOFFICE_VERSION
  APP_IMAGE: $DOCKER_USERNAME/jodconverter-rest:latest

# ── Stage 1: 构建 LibreOffice 基础镜像 ────────────────────────────────────────
build-base:
  stage: build-base
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
    - docker build
        -f runtime/Dockerfile
        --build-arg LIBREOFFICE_VERSION=$LIBREOFFICE_VERSION
        -t $BASE_IMAGE
        .
    - docker push $BASE_IMAGE
  rules:
    - changes:
        - runtime/Dockerfile
        - package/**

# ── Stage 2: 构建应用镜像 ─────────────────────────────────────────────────────
build-app:
  stage: build-app
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
    - docker build
        --build-arg BASE_VERSION=$LIBREOFFICE_VERSION
        --build-arg DOCKER_USERNAME=$DOCKER_USERNAME
        -t $APP_IMAGE
        .
    - docker push $APP_IMAGE
  rules:
    - changes:
        - Dockerfile
        - bin/**
        - runtime/Dockerfile
        - package/**

name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

env:
  LIBREOFFICE_VERSION: "26.2.1"

jobs:
  build-base:
    name: Build LibreOffice Base Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare package directory
        run: mkdir -p package

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runtime/Dockerfile
          push: true
          build-args: |
            LIBREOFFICE_VERSION=${{ env.LIBREOFFICE_VERSION }}
          tags: ${{ vars.DOCKER_USERNAME }}/libreoffice:${{ env.LIBREOFFICE_VERSION }}

  build-app:
    name: Build App Image
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Debug vars
        run: echo "DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }}"

      - name: Build and push app image
        env:
          DOCKER_USER: ${{ vars.DOCKER_USERNAME }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            BASE_VERSION=${{ env.LIBREOFFICE_VERSION }}
            DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }}
          tags: ${{ vars.DOCKER_USERNAME }}/jodconverter-rest:${{ env.LIBREOFFICE_VERSION }}
